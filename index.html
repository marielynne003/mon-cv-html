<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <h2>CV Pro</h2>
    <button onclick="showForm()">Créer mon CV</button>
</header>

<div class="hero">
    <h1>Crée un CV professionnel en 2 minutes</h1>
    <p>Simple • Rapide • Moderne</p>
</div>

<section id="form-section" class="form-box hidden">

    <h2>Créer ton CV</h2>

    <input id="nom" placeholder="Nom">
    <input id="prenom" placeholder="Prénom">
    <input id="job" placeholder="Métier">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Téléphone">
    <input type="file" id="photo">

    <textarea id="description" placeholder="Profil professionnel"></textarea>
    <textarea id="skills" placeholder="Compétences"></textarea>
    <textarea id="languages" placeholder="Langues"></textarea>
    <textarea id="experience" placeholder="Expériences"></textarea>
    <textarea id="education" placeholder="Formation"></textarea>
    <textarea id="hobbies" placeholder="Centres d’intérêt"></textarea>

    <select id="template">
        <option value="classic">Classique (Gratuit)</option>
        <option value="modern">Moderne ⭐ Premium</option>
        <option value="dark">Dark ⭐ Premium</option>
    </select>

    <button onclick="generateCV()">Générer CV</button>

</section>

<section id="cv-result" class="hidden">

<div class="cv">

    <div class="sidebar">
        <img id="cv-photo">

        <h3>Contact</h3>
        <p id="cv-email"></p>
        <p id="cv-phone"></p>

        <h3>Compétences</h3>
        <p id="cv-skills"></p>

        <h3>Langues</h3>
        <p id="cv-languages"></p>

        <h3>Intérêts</h3>
        <p id="cv-hobbies"></p>
    </div>

    <div class="main">
        <h1 id="cv-name"></h1>
        <h2 id="cv-job"></h2>

        <h3>Profil</h3>
        <p id="cv-description"></p>

        <h3>Expériences</h3>
        <p id="cv-exp"></p>

        <h3>Formation</h3>
        <p id="cv-edu"></p>

        <div id="actions"></div>

    </div>

</div>

<button onclick="showLetter()">Créer une lettre de motivation</button>

</section>

<!-- LETTRE -->
<section id="letter-section" class="hidden">
    <h2>Lettre de motivation</h2>
    <button onclick="generateLetter()">Générer</button>
</section>

<section id="letter-result" class="hidden">
    <div class="letter-box" id="letter-box">
        <p id="letter-content"></p>

        <button onclick="downloadLetterPDF()">📄 Télécharger PDF</button>
        <button onclick="downloadLetterWord()">📝 Télécharger Word</button>
    </div>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/2250758810609" class="whatsapp">💬</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
